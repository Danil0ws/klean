name: Build Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux builds
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary_name: klean
            use_cross: true

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            binary_name: klean
            use_cross: true

          # macOS builds
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: klean
            use_cross: false

          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: klean
            use_cross: false

          # Windows builds
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: klean.exe
            use_cross: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross

      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: |
          strip "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" || true

      - name: Create artifact directory
        run: mkdir -p artifacts

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" artifacts/
          cd artifacts
          tar czf "klean-${{ env.VERSION }}-${{ matrix.target }}.tar.gz" "${{ matrix.binary_name }}"
          rm "${{ matrix.binary_name }}"
        env:
          VERSION: ${{ github.ref_name }}

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          copy "target\${{ matrix.target }}\release\${{ matrix.binary_name }}" artifacts\
          cd artifacts
          7z a "klean-${{ env.VERSION }}-${{ matrix.target }}.zip" "${{ matrix.binary_name }}"
          del "${{ matrix.binary_name }}"
        env:
          VERSION: ${{ github.ref_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: klean-${{ matrix.target }}
          path: artifacts/
          retention-days: 1

  create-release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cd artifacts
          for dir in klean-*; do
            if [ -d "$dir" ]; then
              cp "$dir"/* release-assets/ || true
            fi
          done

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-assets/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: release-assets/SHA256SUMS
          retention-days: 30

  publish-crates-io:
    name: Publish to crates.io
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_TOKEN }}
        continue-on-error: true

  update-package-managers:
    name: Update Package Managers
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Trigger Homebrew update
        run: |
          gh workflow run homebrew-update.yml --repo ${{ github.repository }} -f version=${{ steps.version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger AUR update
        run: |
          gh workflow run aur-update.yml --repo ${{ github.repository }} -f version=${{ steps.version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Trigger Scoop update
        run: |
          gh workflow run scoop-update.yml --repo ${{ github.repository }} -f version=${{ steps.version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Linux packages update
        run: |
          gh workflow run linux-packages.yml --repo ${{ github.repository }} -f version=${{ steps.version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
