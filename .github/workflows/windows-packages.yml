name: Update Windows Package Managers

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        required: true
        description: 'Version to publish (e.g., v1.0.0)'

jobs:
  update-chocolatey:
    name: Update Chocolatey
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Chocolatey repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/chocolatey-klean
          token: ${{ secrets.CHOCO_REPO_TOKEN }}
          path: choco-repo

      - name: Generate nuspec
        run: |
          VERSION="${{ inputs.version }}"
          VERSION=${VERSION#v}  # Remove 'v' prefix
          
          cd choco-repo
          
          # Download Windows binary to get hash
          TEMP_DIR=$(mktemp -d)
          wget https://github.com/${{ github.repository }}/releases/download/v${VERSION}/klean-v${VERSION}-x86_64-pc-windows-msvc.zip -O $TEMP_DIR/klean.zip
          SHA256=$(sha256sum $TEMP_DIR/klean.zip | awk '{print $1}')
          
          cat > klean.nuspec << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <package xmlns="http://schemas.microsoft.com/packaging/2015/06/nuspec.xsd">
            <metadata>
              <id>klean</id>
              <version>${VERSION}</version>
              <title>klean</title>
              <authors>klean contributors</authors>
              <owners>klean</owners>
              <projectUrl>https://github.com/${{ github.repository }}</projectUrl>
              <licenseUrl>https://github.com/${{ github.repository }}/blob/main/LICENSE</licenseUrl>
              <projectSourceUrl>https://github.com/${{ github.repository }}</projectSourceUrl>
              <docsUrl>https://github.com/${{ github.repository }}/blob/main/README.md</docsUrl>
              <description>
                Safe, efficient CLI for cleaning development environments
              </description>
              <summary>
                A comprehensive tool inspired by npkill that safely removes build artifacts, caches, and dependencies for Node.js, Python, Rust, Java, and 20+ other languages.
              </summary>
              <tags>cleaning development build cache artifacts</tags>
              <copyright>2024</copyright>
              <releaseNotes>https://github.com/${{ github.repository }}/releases/tag/v${VERSION}</releaseNotes>
            </metadata>
            <files>
              <file src="legal/**" target="legal" />
              <file src="tools/**" target="tools" />
            </files>
          </package>
          EOF
          
          mkdir -p legal tools
          
          cat > tools/chocolateyinstall.ps1 << 'PSEOF'
          $ErrorActionPreference = 'Stop'
          
          $packageName = 'klean'
          $toolsDir = "$(Split-Path -parent $MyInvocation.MyCommand.Definition)"
          
          $url = 'https://github.com/${{ github.repository }}/releases/download/v${VERSION}/klean-v${VERSION}-x86_64-pc-windows-msvc.zip'
          $checksum = '${SHA256}'
          $checksumType = 'sha256'
          
          $zipFile = Join-Path $env:TEMP "klean.zip"
          
          Get-ChocolateyWebFile -PackageName $packageName `
                                -FileFullPath $zipFile `
                                -Url $url `
                                -Checksum $checksum `
                                -ChecksumType $checksumType
          
          Get-ChocolateyUnzip -FileFullPath $zipFile `
                              -Destination $toolsDir
          
          Remove-Item $zipFile -Force
          PSEOF
          
          cat > tools/chocolateyuninstall.ps1 << 'PSEOF'
          # Nothing to do on uninstall
          PSEOF
          
          cp LICENSE legal/LICENSE.txt || cp ../LICENSE legal/LICENSE.txt
          
          rm -rf $TEMP_DIR

      - name: Publish to Chocolatey
        run: |
          cd choco-repo
          
          # Install Chocolatey CLI
          if ! command -v choco &> /dev/null; then
            wget https://community.chocolatey.org/install.ps1 -O install.ps1
            powershell -NoProfile -ExecutionPolicy Bypass -Command "&'./install.ps1'"
          fi
          
          choco pack klean.nuspec
          choco push klean.${{ inputs.version }}.nupkg --key=${{ secrets.CHOCOLATEY_API_KEY }}
        shell: bash
        continue-on-error: true

      - name: Commit and push
        run: |
          cd choco-repo
          
          git config user.name "klean bot"
          git config user.email "bot@klean.local"
          git add klean.nuspec tools/
          git commit -m "Update to ${{ inputs.version }}" || true
          git push

  update-winget:
    name: Update Windows Package Manager (winget)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare WinGet manifest
        run: |
          VERSION="${{ inputs.version }}"
          VERSION=${VERSION#v}  # Remove 'v' prefix
          DOTVERSION=$(echo $VERSION | sed 's/^v//')
          
          mkdir -p winget-manifest/manifests/k/klean/klean/${DOTVERSION}
          cd winget-manifest/manifests/k/klean/klean/${DOTVERSION}
          
          # Download binary to get hash
          TEMP_DIR=$(mktemp -d)
          wget https://github.com/${{ github.repository }}/releases/download/v${VERSION}/klean-v${VERSION}-x86_64-pc-windows-msvc.zip -O $TEMP_DIR/klean.zip
          SHA256=$(sha256sum $TEMP_DIR/klean.zip | awk '{print $1}')
          
          cat > klean.installer.yaml << EOF
          # Created with YamlCreate.ps1 v2.0.0 using InputObject
          PackageIdentifier: klean.klean
          PackageVersion: ${DOTVERSION}
          InstallerLocale: en-US
          Installers:
          - Architecture: x64
            InstallerType: zip
            InstallerUrl: https://github.com/${{ github.repository }}/releases/download/v${VERSION}/klean-v${VERSION}-x86_64-pc-windows-msvc.zip
            InstallerSha256: ${SHA256}
          ManifestType: installer
          ManifestVersion: 1.4.0
          EOF
          
          cat > klean.locale.en-US.yaml << 'EOF'
          # Created with YamlCreate.ps1 v2.0.0 using InputObject
          PackageIdentifier: klean.klean
          PackageVersion: ${DOTVERSION}
          PackageLocale: en-US
          Publisher: klean contributors
          PublisherUrl: https://github.com/${{ github.repository }}
          PublisherSupportUrl: https://github.com/${{ github.repository }}/issues
          PackageName: klean
          PackageUrl: https://github.com/${{ github.repository }}
          License: MIT OR Apache-2.0
          LicenseUrl: https://github.com/${{ github.repository }}/blob/main/LICENSE
          ShortDescription: Safe, efficient CLI for cleaning development environments
          Description: |
            klean is a comprehensive tool inspired by npkill that safely removes build artifacts,
            caches, and dependencies for Node.js, Python, Rust, Java, and 20+ other programming languages.
          Tags:
          - development
          - build
          - cache
          - cleanup
          ManifestType: defaultLocale
          ManifestVersion: 1.4.0
          EOF
          
          cat > klean.yaml << EOF
          PackageIdentifier: klean.klean
          PackageVersion: ${DOTVERSION}
          DefaultLocale: en-US
          ManifestType: version
          ManifestVersion: 1.4.0
          EOF
          
          rm -rf $TEMP_DIR

      - name: Create Pull Request to winget-pkgs
        uses: peter-evans/create-pull-request@v5
        with:
          repository: microsoft/winget-pkgs
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'Add klean v${{ inputs.version }}'
          title: 'Add klean v${{ inputs.version }}'
          body: |
            This PR adds or updates the klean package for Windows Package Manager (winget).
            
            - Version: ${{ inputs.version }}
            - Repository: ${{ github.repository }}
          branch: create-pull-request/klean-update
          delete-branch: true
          path: winget-manifest
        continue-on-error: true

  mise-plugin:
    name: Update Mise Plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Mise plugin repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/mise-klean
          token: ${{ secrets.MISE_PLUGIN_TOKEN }}
          path: mise-plugin

      - name: Update plugin
        run: |
          VERSION="${{ inputs.version }}"
          VERSION=${VERSION#v}  # Remove 'v' prefix
          
          cd mise-plugin
          
          # Update versions in the plugin
          sed -i "s/KLEAN_VERSION=.*/KLEAN_VERSION='${VERSION}'/" bin/latest-version
          
          # Update plugin.toml if exists
          if [ -f "plugin.toml" ]; then
            sed -i "s/repo = .*/repo = \"${{ github.repository }}\"/" plugin.toml
          fi
          
          git config user.name "klean bot"
          git config user.email "bot@klean.local"
          git add -A
          git commit -m "Update to v${VERSION}" || true
          git push

  create-release-summary:
    name: Create Release Summary
    runs-on: ubuntu-latest
    needs: [update-chocolatey, update-winget, mise-plugin]
    if: always()
    steps:
      - name: Log completion
        run: |
          echo "Windows package manager updates completed"
          echo "- Chocolatey: Updated (continue-on-error)"
          echo "- WinGet: PR created (continue-on-error)"
          echo "- Mise Plugin: Updated (continue-on-error)"
