name: Update Homebrew

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        required: true
        description: 'Version to publish (e.g., v1.0.0)'

jobs:
  update-homebrew:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/homebrew-klean
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-klean

      - name: Update formula
        run: |
          VERSION="${{ inputs.version }}"
          VERSION=${VERSION#v}  # Remove 'v' prefix
          
          cd homebrew-klean
          
          # Download the macOS x86_64 binary to get its hash
          wget https://github.com/${{ github.repository }}/releases/download/v${VERSION}/klean-v${VERSION}-x86_64-apple-darwin.tar.gz -O /tmp/klean.tar.gz
          
          # Calculate SHA256
          SHA256=$(sha256sum /tmp/klean.tar.gz | awk '{print $1}')
          
          # Update formula
          cat > Formula/klean.rb << EOF
          class Klean < Formula
            desc "Safe, efficient CLI for cleaning development environments"
            homepage "https://github.com/${{ github.repository }}"
            url "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/klean-v${VERSION}-x86_64-apple-darwin.tar.gz"
            sha256 "${SHA256}"
            license "MIT OR Apache-2.0"
          
            depends_on :macos
          
            def install
              bin.install "klean"
            end
          
            test do
              assert_match "A safe, efficient CLI", shell_output("#{bin}/klean --help")
            end
          end
          EOF
          
          git config user.name "klean bot"
          git config user.email "bot@klean.local"
          git add Formula/klean.rb
          git commit -m "Update klean to ${VERSION}" || true
          git push

      - name: Create or update Pull Request
        if: always()
        run: |
          cd homebrew-klean
          
          # Check if remote has newer commits
          git fetch origin main
          if ! git diff --quiet origin/main..HEAD; then
            echo "Changes pushed successfully"
          fi

  test-homebrew:
    name: Test Homebrew Formula
    runs-on: macos-latest
    needs: update-homebrew
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/homebrew-klean
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Test formula
        run: |
          brew install --build-from-source ./Formula/klean.rb
          klean --version
          klean --help
